services:
  db:
    image: postgres:15
    container_name: tarefas_db
    restart: always
    environment:
      POSTGRES_USER: user_tarefas
      POSTGRES_PASSWORD: password_tarefas
      POSTGRES_DB: db_tarefas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user_tarefas -d db_tarefas"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: tarefas_api
    restart: always
    env_file:
      - .env
    environment:
      # dentro da rede do compose o banco e acessado pelo host "db"
      DATABASE_URL: postgresql://user_tarefas:password_tarefas@db:5432/db_tarefas
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  bot:
    build: .
    container_name: tarefas_bot
    restart: always
    env_file:
      - .env
    environment:
      # dentro da rede do compose a API é acessada pelo host "api"
      API_BASE_URL: http://api:8000
    command: python -m bot.client_bot
    depends_on:
      - api

  pgadmin:
    image: dpage/pgadmin4
    container_name: tarefas_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8080:80"
    depends_on:
      - db

volumes:
  postgres_data:
